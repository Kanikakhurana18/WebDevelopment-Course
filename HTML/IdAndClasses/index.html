<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Id and Classes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- id cannot be same (unique) but class can be same -->
  <div id="firstdiv" class="red background colour">first</div> <!---two classes are written with space separeted by double quotes-->
  <div id="seconddiv">first</div> <!--div block element-->
  <span class="pink">first span</span> <!--inline element-->
  <span class="pink">second span</span>
</body>
</html>
