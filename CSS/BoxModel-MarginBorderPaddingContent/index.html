<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Model -Margin,Border, Padding, Content</title>
  <style>
    *{
            margin: 0;
            padding: 0;
        }

        .box {
            background-color: aqua;
            font-size: x-large;
        }
        .box1{
            color: rgb(111, 0, 255);
            padding: 10px;
            margin:35px;
            /*MARGIN COLLAPSE:-If 2 margins override each other then maximum margin between 2 will be kept.*/
            border: 4px solid blue;
            height: 200px;
            box-sizing: border-box;/*a CSS property that tells the browser to include an element's padding and border within its specified width and height(NO MARGIN)*/
        }
        .box2{
            color:red;
            padding: 10px;
            margin:25px;
            border: 2px solid black;
            height: 200px;
            box-sizing: border-box;
        }
  </style>
</head>
<body>
   <div class="box box1">I am a box</div> <!--different classes inside div-->
    <div class="box box2">I am another box</div>
  
</body>
</html>
