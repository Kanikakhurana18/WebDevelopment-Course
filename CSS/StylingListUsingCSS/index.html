<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styling Lists</title>
  <style>
    nav ul li{
      list-style: devanagari;
      background-color: yellow;
      list-style-position: inside;
      border: 2px solid orange;
      list-style-type: "😊";
      /* list-style-image: url("https://showcaseidx.com/wp-content/uploads/css-illustration-1024x615.jpg"); */
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li>Home</li>
      <li>About</li>
      <li>Contact</li>
    </ul>
  </nav>
</body>
</html>
